services:
  # ─── Database ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:4.4
    container_name: aidn-mongo
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: aidn

  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api-dev
    container_name: aidn-api
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "4400:4400"
    env_file:
      - ./api.test.env
    volumes:
      - ../apps/api:/app
      - api_node_modules:/app/node_modules
    command: npx tsx watch src/server.ts

  # ─── Admin (back-office) ────────────────────────────────────────────────────
  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: admin-dev
    container_name: aidn-admin
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_APP_NAME: AIDN
      VITE_APP_VERSION: "0.1.1"
      VITE_ENV: test
      VITE_DATA_MODE: api
      VITE_API_BASE_URL: http://100.110.227.69:4400
      VITE_SPLASH_ENABLED: "true"
      VITE_SPLASH_MIN_MS: "800"
      VITE_SPLASH_MAX_MS: "2500"
    volumes:
      - ../apps/admin:/app
      - admin_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  # ─── Portal (public-facing) ─────────────────────────────────────────────────
  portal:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: portal-dev
    container_name: aidn-portal
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://100.110.227.69:4400
    volumes:
      - ../apps/portal:/app
      - portal_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  mongo_data:
  api_node_modules:
  admin_node_modules:
  portal_node_modules:
