services:

  # ─── Database ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: aidn-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: aidn

  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: api-dev
    container_name: aidn-api
    depends_on:
      - mongo
    ports:
      - "4000:4000"
    env_file:
      - ./api.env
    volumes:
      - ../apps/api:/app
      - api_node_modules:/app/node_modules
    command: npx tsx watch src/server.ts

  # ─── Admin (back-office) ────────────────────────────────────────────────────
  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: admin-dev
    container_name: aidn-admin
    ports:
      - "5173:5173"
    env_file:
      - ../apps/admin/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../apps/admin:/app
      - admin_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  # ─── Portal (public-facing) ─────────────────────────────────────────────────
  portal:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: portal-dev
    container_name: aidn-portal
    ports:
      - "5174:5174"
    env_file:
      - ../apps/portal/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../apps/portal:/app
      - portal_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  mongo_data:
  api_node_modules:
  admin_node_modules:
  portal_node_modules:
